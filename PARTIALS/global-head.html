<head>
  <meta charset="utf-8" />
  <meta name="site-base" content="/blackv/" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- SEO -->
  <title>Black Velvet</title>
  <meta name="description" content="Black Velvet: lencería, juguetes y accesorios con envío discreto y atención por WhatsApp." />
  <meta name="robots" content="index,follow" />
  <meta name="color-scheme" content="dark light" />

  <!-- Theme early -->
  <script>
  (function(){
    try{
      var t=localStorage.getItem("blackvelvet_theme");
      document.documentElement.dataset.theme=(t==="light"||t==="dark")?t:"dark";
    }catch(e){document.documentElement.dataset.theme="dark";}
  })();
  </script>

  <!-- Theme colors -->
  <meta name="theme-color" content="#0b0b0f" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Black Velvet" />
  <meta property="og:title" content="Black Velvet" />
  <meta property="og:description" content="Lencería y juguetes con envío discreto." />
  <meta property="og:image" content="/blackv/IMG/og-blackvelvet.webp" />
  <meta name="twitter:card" content="summary_large_image" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">

  <!-- CSS -->
  <link rel="stylesheet" href="/blackv/main.css">

  <!-- JS -->
  <script src="/blackv/app.js" defer></script>

  <!-- Favicons -->
  <link rel="apple-touch-icon" sizes="180x180" href="/blackv/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/blackv/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/blackv/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/blackv/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/blackv/android-chrome-512x512.png">
  <link rel="manifest" href="/blackv/site.webmanifest">
</head>
